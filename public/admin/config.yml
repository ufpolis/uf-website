backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

site_url: "https://ufpolis.com"
display_url: "https://ufpolis.com"

collections:

  # ── Repeatable lists ──────────────────────────────────────────────────────

  - name: "events"
    label: "Events"
    files:
      - name: "events"
        label: "Events List"
        file: "src/data/events.json"
        fields:
          - name: "events"
            label: "Events"
            widget: "list"
            hint: "Each entry is one event card on the Programming page. Events appear in the order listed here."
            fields:
              - label: "Event Name"
                name: "name"
                widget: "string"
                hint: "Full event title shown on the card."
              - label: "Slug"
                name: "slug"
                widget: "string"
                hint: "URL-safe identifier (lowercase letters and hyphens only, e.g. law-school-panel). Never change this after the event goes live — it appears in calendar download links."
              - label: "Description"
                name: "description"
                widget: "markdown"
                hint: "2–4 sentences shown on the event card."
              - label: "Display Date"
                name: "date"
                widget: "string"
                hint: "Human-readable date shown on the card, e.g. September 12, 2026."
              - label: "Start Date/Time"
                name: "startISO"
                widget: "datetime"
                required: false
                hint: "Leave blank if the date is not yet confirmed — the calendar download button will be hidden until set."
                date_format: "YYYY-MM-DD"
                time_format: "HH:mm:ss"
                format: "YYYY-MM-DDTHH:mm:ss"
              - label: "End Date/Time"
                name: "endISO"
                widget: "datetime"
                required: false
                date_format: "YYYY-MM-DD"
                time_format: "HH:mm:ss"
                format: "YYYY-MM-DDTHH:mm:ss"
              - label: "Location"
                name: "location"
                widget: "string"
                hint: "Room and building, e.g. Pugh Hall, Room 170 — University of Florida."
              - label: "Event Image"
                name: "image"
                widget: "image"
                required: false
                hint: "Upload JPG or PNG, landscape (1200x675px recommended), under 800KB. Use Squoosh (squoosh.app) to compress before uploading."
                media_folder: "/public/uploads/events"
                public_folder: "/uploads/events"
                choose_url: false

  - name: "exec-board"
    label: "Executive Board"
    files:
      - name: "exec-board"
        label: "Board Members"
        file: "src/data/executiveBoard.json"
        fields:
          - name: "members"
            label: "Members"
            widget: "list"
            hint: "Each entry is one card on the Executive Board page. The order here is the display order on the page."
            fields:
              - label: "Full Name"
                name: "name"
                widget: "string"
              - label: "Position Title"
                name: "position"
                widget: "string"
                hint: "e.g. Co-President or VP of Programming."
              - label: "Major & Year"
                name: "major"
                widget: "string"
                required: false
                hint: "e.g. Political Science, Junior. Leave blank to hide this line."
              - label: "Bio"
                name: "bio"
                widget: "markdown"
                required: false
                hint: "2–4 sentences. Shown on the board page if the bio field is rendered."
              - label: "Headshot"
                name: "headshot"
                widget: "image"
                required: false
                hint: "Upload JPG or PNG, square crop (800x800px recommended), under 400KB. Use Squoosh (squoosh.app) to compress before uploading. Leave blank to show the POLIS placeholder."
                media_folder: "/public/uploads/headshots"
                public_folder: "/uploads/headshots"
                choose_url: false
              - label: "LinkedIn URL"
                name: "linkedin"
                widget: "string"
                required: false
                hint: "Full URL, e.g. https://www.linkedin.com/in/username. Leave blank to hide the LinkedIn button."

  - name: "network"
    label: "Network / Internships"
    files:
      - name: "internships"
        label: "Network Entries"
        file: "src/data/internships.json"
        fields:
          - name: "entries"
            label: "Internship & Employer Logo Cards"
            widget: "list"
            hint: "Each entry is one logo card on the Network page. Add new entries as members share their placements."
            fields:
              - label: "Organization or Role Title"
                name: "title"
                widget: "string"
                hint: "Displayed as the card label, e.g. Legal or Digital Analytics and Donor Insights."
              - label: "Logo Image"
                name: "logo"
                widget: "image"
                hint: "Upload PNG or JPG, under 200KB. Transparent background recommended for PNGs. Use Squoosh (squoosh.app) to compress before uploading."
                media_folder: "/public/uploads/internships"
                public_folder: "/uploads/internships"
                choose_url: false
              - label: "Alt Text"
                name: "alt"
                widget: "string"
                hint: "Describe the logo for screen readers, e.g. Legal internship logo."
          - name: "houseEntries"
            label: "House of Representatives Entries"
            widget: "list"
            hint: "Entries shown as House of Representatives cards on the Network page (always displayed first, using the House logo)."
            fields:
              - label: "Office Name"
                name: "title"
                widget: "string"
                hint: "e.g. Office of Rep. Kathy Castor (FL-14)."

  # ── Site Settings ─────────────────────────────────────────────────────────

  - name: "settings"
    label: "Site Settings"
    files:
      - name: "site"
        label: "Global Links & Contact"
        file: "src/data/site.json"
        fields:
          - label: "Instagram URL"
            name: "instagram"
            widget: "string"
            hint: "Full URL used on the Contact page and in the footer, e.g. https://www.instagram.com/ufpolis."
          - label: "Instagram Handle"
            name: "instagramHandle"
            widget: "string"
            hint: "Display handle shown in the Contact section, e.g. @ufpolis."
          - label: "LinkedIn URL"
            name: "linkedin"
            widget: "string"
            hint: "Full URL to the POLIS UF LinkedIn company page."
          - label: "Email Address"
            name: "email"
            widget: "string"
            hint: "Contact email shown on the Contact page and used for mailto links."
          - label: "Application Form URL"
            name: "applyUrl"
            widget: "string"
            hint: "Full Google Form URL for membership applications. Update each recruitment cycle."
          - label: "Executive Board Page URL"
            name: "execBoardUrl"
            widget: "string"
            hint: "Internal path to the Executive Board page. Usually /members/executive-board — only change if the URL changes."
          - label: "Site URL"
            name: "siteUrl"
            widget: "string"
            hint: "The live domain of the site, e.g. https://ufpolis.com. Update only when the domain changes — this affects SEO canonical links and sitemap."

  # ── Page Content ──────────────────────────────────────────────────────────

  - name: "pages"
    label: "Page Content"
    files:

      - name: "home"
        label: "Home Page"
        file: "src/data/home.json"
        fields:
          - name: "hero"
            label: "Hero Section"
            widget: "object"
            fields:
              - label: "Tagline"
                name: "tagline"
                widget: "text"
                hint: "Subtitle displayed under 'POLIS' in the hero banner. Keep to 1–2 sentences."
          - name: "whoWeAre"
            label: "Who We Are Section"
            widget: "object"
            fields:
              - label: "Body Text"
                name: "body"
                widget: "markdown"
                hint: "The main body copy for the Who We Are section. Separate paragraphs with a blank line."
          - name: "whyPolis"
            label: "Why POLIS Section"
            widget: "object"
            fields:
              - label: "Pull Quote"
                name: "pullQuote"
                widget: "text"
                hint: "Displayed in the styled blockquote bubble. 1–2 sentences, no quotation marks needed."
              - label: "Body Text"
                name: "body"
                widget: "markdown"
                hint: "Body paragraphs for the Why POLIS section. Separate paragraphs with a blank line."
          - name: "mission"
            label: "Mission Section"
            widget: "object"
            fields:
              - label: "Pull Quote"
                name: "pullQuote"
                widget: "text"
                hint: "Displayed in the pull-quote bubble above the mission goal cards."
              - label: "Body Text"
                name: "body"
                widget: "markdown"
                hint: "Mission intro paragraphs. Separate paragraphs with a blank line."
              - name: "goals"
                label: "Mission Goal Cards"
                widget: "list"
                hint: "The three flip cards shown in the Mission section. Keep exactly 3 — the icons are hardcoded to match the card position."
                fields:
                  - label: "Card Title"
                    name: "title"
                    widget: "string"
                  - label: "Card Body"
                    name: "body"
                    widget: "markdown"
                    hint: "2–4 sentences shown on the back of the flip card."
              - label: "Closing Quote"
                name: "closingQuote"
                widget: "text"
                hint: "Pull quote displayed below the mission goal cards."

      - name: "philanthropy"
        label: "Philanthropy Page"
        file: "src/data/philanthropy.json"
        fields:
          - name: "intro"
            label: "Intro Section"
            widget: "object"
            fields:
              - label: "Body Text"
                name: "body"
                widget: "markdown"
                hint: "Opening paragraph for the philanthropy page."
          - label: "Intro Pull Quote"
            name: "introPullQuote"
            widget: "text"
            hint: "Displayed in the pull-quote bubble in the intro section."
          - name: "focusAreas"
            label: "Focus Area Cards"
            widget: "list"
            hint: "The six service focus area flip cards. Keep exactly 6 — the icons are hardcoded by position."
            fields:
              - label: "Title"
                name: "title"
                widget: "string"
              - label: "Description"
                name: "description"
                widget: "markdown"
                hint: "2–4 sentences shown on the back of the flip card."
          - name: "futureInitiatives"
            label: "Future Initiatives Section"
            widget: "object"
            fields:
              - label: "Heading"
                name: "heading"
                widget: "string"
                hint: "Section heading, e.g. Future Initiatives."
              - label: "Body Text"
                name: "body"
                widget: "markdown"
                hint: "Paragraph describing planned future philanthropy projects."

      - name: "join"
        label: "Join Page"
        file: "src/data/join.json"
        fields:
          - name: "process"
            label: "Recruitment Process Section"
            widget: "object"
            fields:
              - label: "Body Text"
                name: "body"
                widget: "markdown"
                hint: "Paragraphs describing the recruitment process. Separate paragraphs with a blank line."
          - label: "Process Pull Quote"
            name: "processPullQuote"
            widget: "text"
            hint: "Displayed in the pull-quote bubble in the recruitment process section."
          - name: "faqs"
            label: "FAQ Items"
            widget: "list"
            hint: "Frequently asked questions shown in the FAQ accordion section."
            fields:
              - label: "Question"
                name: "q"
                widget: "string"
              - label: "Answer"
                name: "a"
                widget: "markdown"
                hint: "Answer text. Keep to 1–3 sentences."
          - name: "timeline"
            label: "Recruitment Timeline Steps"
            widget: "list"
            hint: "The four steps shown in the timeline. Keep exactly 4 steps."
            fields:
              - label: "Step Label"
                name: "label"
                widget: "string"
                hint: "e.g. Information Session or Applications Open."
              - label: "Date"
                name: "date"
                widget: "string"
                hint: "e.g. September 5, 2026. Use [Date TBD] if the date is not yet confirmed."
